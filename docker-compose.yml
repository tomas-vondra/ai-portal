services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d ai_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://portal:portal@postgres:5432/ai_portal
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      HOST: "0.0.0.0"
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["node", "dist/worker.js"]
    environment:
      DATABASE_URL: postgres://portal:portal@postgres:5432/ai_portal
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
